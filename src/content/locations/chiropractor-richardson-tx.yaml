  - question: "Can I combine my visit with other errands?"
    answer: "Many Richardson families combine their Trinity Life appointment with shopping at Allen Premium Outlets, lunch in Allen, or other errands in the Plano-Allen corridor. It makes the trip multi-purpose and efficient."
  - question: "Do you offer early morning or evening hours?"
