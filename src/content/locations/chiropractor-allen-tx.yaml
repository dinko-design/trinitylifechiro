faqs:
  - question: "Where exactly is Trinity Life Chiropractic located in Allen?"
    answer: "We are located at 301 N Allen Dr, Allen, TX 75013. Our office is just east of US-75 (Central Expressway), easily accessible from McDermott Dr. We're near Allen Premium Outlets and Celebration Park."
  - question: "What are your office hours in Allen?"
    answer: "We are open Monday and Tuesday from 9 AM to 6 PM, Thursday from 8 AM to 6 PM, and Friday from 9 AM to 1 PM. We are closed on Wednesday, Saturday, and Sunday."
  - question: "Do you accept insurance at your Allen office?"
    answer: "We are an out-of-network provider, which means we prioritize your care plan based on what your body needs, not what insurance dictates. We do provide superbills that you can submit to your insurance for potential reimbursement."
  - question: "Is there parking available?"
    answer: "Yes! We have a dedicated parking lot right in front of our office with plenty of free parking spaces, including spots close to the entrance for pregnant moms."
  - question: "Do you offer same-day appointments in Allen?"
    answer: "We do our best to accommodate urgent needs. Same-day availability depends on our schedule, but we typically have same-week openings for new patients. Call us at (214) 509-7744 to check availability."
  - question: "What makes Trinity Life different from other chiropractors in Allen?"
    answer: "We are a neurologically focused office specializing in prenatal and pediatric care. We use INSiGHT scanning technology to objectively measure nervous system function, and our adjustments are tailored to each patient's unique neurological needs — not a one-size-fits-all approach."
