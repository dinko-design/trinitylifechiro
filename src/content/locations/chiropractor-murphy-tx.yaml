faqs:
  - question: "How long is the drive from Murphy to Trinity Life?"
    answer: "Most Murphy residents reach us in 8-12 minutes via FM 544 North or US-75 North. Our office is right off McDermott Dr in Allen — very accessible from Murphy."
  - question: "Do you see a lot of families from Murphy?"
    answer: "Yes! Murphy families are one of our largest community groups. The city's young family demographic aligns perfectly with our prenatal and pediatric specialization."
  - question: "My baby has colic — can you help?"
    answer: "Colic is one of the most common reasons Murphy families bring their infants to us. Our gentle approach focuses on reducing tension in the nervous system, often providing significant relief within the first few visits."
  - question: "Is chiropractic safe for newborns?"
    answer: "Absolutely. Our pediatric adjustments use no more pressure than you'd use to check a tomato for ripeness. It's extremely gentle and safe for newborns as young as a few days old."
  - question: "Do you accept families from the Plano ISD part of Murphy?"
    answer: "Of course! We serve families from all parts of Murphy regardless of school district. Many of our Murphy families are in Plano ISD, and we're familiar with the community."
  - question: "Can I bring my stroller and diaper bag?"
    answer: "Yes! Our office is designed for families. We have plenty of room for strollers, a play area for siblings, and a nursing-friendly environment. You'll feel right at home."
