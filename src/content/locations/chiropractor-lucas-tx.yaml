faqs:
  - question: "How far is your office from Lucas, TX?"
    answer: "Our office is approximately 5 miles west of Lucas — about an 8-12 minute drive on local roads like Bethany Dr or Angel Pkwy. No highway driving required."
  - question: "Is chiropractic care good for active/equestrian kids?"
    answer: "Absolutely. Many of our Lucas families bring their athletic and equestrian kids in for regular care. Chiropractic helps with injury prevention, faster recovery, better coordination, and keeping growing bodies aligned during intense physical activity."
  - question: "Do you understand the needs of rural families?"
    answer: "Yes! Several of our Lucas families live on acreage and have unique physical demands. We tailor care to support active, outdoor lifestyles — from kids who ride horses to parents managing property."
  - question: "Can I bring multiple kids in at once?"
    answer: "Of course! We love it when the whole family comes. Our office is designed for families, and we can see everyone efficiently during the same visit."
  - question: "Do you work with Lovejoy ISD families?"
    answer: "Yes, we see many families in the Lovejoy ISD district. Students, athletes, teachers, and parents — we serve the whole Lovejoy community."
  - question: "What's the easiest route from eastern Lucas?"
    answer: "From eastern Lucas, take Country Club Rd or FM 1378 south to Bethany Dr, then head west. You'll reach our office in about 12-15 minutes depending on your exact location."
